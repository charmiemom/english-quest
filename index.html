      0%, 100% { transform: translateY(0); }

  <div class="game-container">
    <div class="header">

        <button class="back-btn-header" onclick="goBack()" id="backBtn" style="display: none;">BACK</button>
      </div>
    </div>

    <div id="startScreen" class="screen active">
      <div class="title">🧔 Steve's English Quest</div>
      <div class="subtitle">Choose your difficulty level</div>
      <div class="difficulty-buttons">
        <button class="difficulty-btn" onclick="startGame('seedling')">🌱 Seedling</button>
        <button class="difficulty-btn tree" onclick="startGame('tree')">🌳 Tree</button>
        <button class="difficulty-btn forest" onclick="startGame('forest')">🌲 Forest</button>
      </div>
    </div>

    <div id="gameArea">
      <div class="question-area">
        <div class="question-number">Question <span id="questionNumber">1</span> of 10</div>
        <div id="questionText"></div>
        <button class="audio-btn" onclick="playAudio()">🔊 Listen</button>
      </div>
      <div id="feedback"></div>
      <div class="options-container" id="optionsContainer"></div>
    </div>

    <div id="endScreen" class="screen">
      <div class="end-message">Quiz Complete</div>
      <div class="final-score" id="finalScore">0</div>
      <div class="coins-earned">Coins Earned: <span id="coinsEarned">0</span> 🪙</div>
      <div class="end-buttons">
        <button class="end-btn review-btn" onclick="showReview()" id="reviewBtnEnd" style="display: none;">📋 Review Mistakes</button>
        <button class="end-btn" onclick="playAgain()">▶ Play Again</button>
        <button class="end-btn menu-btn" onclick="goHome()">🏠 Back to Menu</button>

    </div>

    <div id="reviewScreen" class="screen">
      <div class="review-title">📋 Review Your Mistakes</div>
      <div class="review-items" id="reviewItems"></div>
      <div class="review-pagination" id="pagination"></div>
      <button class="end-btn menu-btn" onclick="goHome()" style="width: 100%; margin-top: 20px;">🏠 Back to Menu</button>
    </div>

    // 난이도 맵핑
    const difficultyMap = {
      'seedling': 'level_1_sr_1_3_to_2_2',
      'tree': 'level_2_sr_2_3_to_3_0',
      'forest': 'level_3_sr_3_1_to_3_9'
    };

    // 문제 순서 섞기
    function shuffleQuestionsIntelligently(questions) {
      const shuffled = [...questions];
      const result = [];
      const used = new Set();

      let currentIndex = Math.floor(Math.random() * shuffled.length);
      result.push(shuffled[currentIndex]);
      used.add(currentIndex);

      while (result.length < 10) {
        let nextIndex;
        let attempts = 0;

        do {
          nextIndex = Math.floor(Math.random() * shuffled.length);
          attempts++;
        } while (used.has(nextIndex) && attempts < 20);

        if (!used.has(nextIndex)) {
          result.push(shuffled[nextIndex]);
          used.add(nextIndex);
        }
      }

      return result;
    }

    // 코인 바 업데이트
    function updateCoinBar() {
      const maxCoins = 50;
      const percentage = (gameState.sessionCoins / maxCoins) * 100;
      const fill = document.getElementById('coinBarFill');
      fill.style.width = Math.min(percentage, 100) + '%';
    }

    // 게임 시작
    function startGame(difficulty) {
      gameState.difficulty = difficulty;
      gameState.currentQuestion = 0;
      gameState.score = 0;
      gameState.sessionCoins = 0;
      gameState.mistakes = [];
      gameState.currentPage = 0;
      gameState.gameInProgress = true;
      
      const levelKey = difficultyMap[difficulty];
      const allQuestions = questionData[levelKey];
      gameState.shuffledQuestions = shuffleQuestionsIntelligently(allQuestions);
      
      updateCoinBar();
      document.getElementById('totalCoins').textContent = '0';
      
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameArea').classList.add('active');
      document.getElementById('backBtn').style.display = 'block';
      
      loadQuestion();
    }

   /* 문제 로드 함수 - HTML 렌더링 부분만 수정 */
function loadQuestion() {
  if (gameState.currentQuestion >= 10) {
    endGame();
    return;
  }

  gameState.answered = false;
  gameState.questionData = gameState.shuffledQuestions[gameState.currentQuestion];
  const q = gameState.questionData;

  // underline만 표시 (괄호 없음) - 개선된 버전
  const questionHTML = q.question.replace(/_+/g, '<span class="blank-underline"></span>');
  document.getElementById('questionText').innerHTML = questionHTML;
  document.getElementById('questionNumber').textContent = gameState.currentQuestion + 1;
  document.getElementById('feedback').textContent = '';

  const opts = [...q.options].sort(() => Math.random() - 0.5);
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  opts.forEach(option => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = option;
    btn.onclick = () => checkAnswer(option, q.correct, btn);
    container.appendChild(btn);
  });
}


    // 답변 확인
    function checkAnswer(selected, correct, button) {
      if (gameState.answered) return;

      gameState.answered = true;
      const isCorrect = selected === correct;

      if (isCorrect) {
        gameState.score++;
        button.classList.add('correct');
        document.getElementById('feedback').textContent = '✓ Correct. Great job';
        document.getElementById('feedback').style.color = '#4caf50';
        playSound('correct');
        
        gameState.sessionCoins += coinRewards[gameState.difficulty].correct;
        
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            updateCoinBar();
          }, i * 60);
        }
      } else {
        button.classList.add('wrong');
        document.getElementById('feedback').textContent = `✗ Not quite. The answer is: ${correct}`;
        document.getElementById('feedback').style.color = '#d32f2f';
        playSound('wrong');
        gameState.mistakes.push({
          question: gameState.questionData.question,
          correct: correct,
          yourAnswer: selected
        });
      }

      document.getElementById('totalCoins').textContent = gameState.sessionCoins;

      setTimeout(() => {
        gameState.currentQuestion++;
        loadQuestion();
      }, 1500);
    }

    // 소리 재생
    
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'correct') {
      const notes = [800, 1000, 1200];
      notes.forEach((freq, i) => {
        setTimeout(() => {
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.15);
        }, i * 150);
      });
    } else {
      const notes = [400, 300];
      notes.forEach((freq, i) => {
        setTimeout(() => {
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.2);
        }, i * 200);
      });
    }
  } catch (error) {
    console.log('Audio context error - continuing without sound');
  }
}

    // 음성 재생 함수 (개선된 버전)
function playAudio() {
  let text = gameState.questionData.question;
  // underscore를 "blank"로 변환하여 읽음
  text = text.replace(/_+/g, 'blank');
  
  // 모바일 호환성 개선
  try {
    // 방법 1: Google Translate TTS (최우선)
    const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&q=${encodeURIComponent(text)}&tl=en-US`;
    const audio = new Audio(url);
    
    // 모바일에서 재생 보장
    audio.crossOrigin = "anonymous";
    
    audio.play().then(() => {
      // 성공
    }).catch(() => {
      // 방법 2: Web Speech API (Google Translate 실패 시)
      speakWithWebSpeech(text);
    });
  } catch (error) {
    // 방법 3: Web Speech API (보안 오류 시)
    speakWithWebSpeech(text);
  }
}

// Web Speech API를 사용한 음성 재생 (모바일 완벽 지원)
function speakWithWebSpeech(text) {
  // 이전 재생 중단
  window.speechSynthesis.cancel();
  
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.9;
  utt.pitch = 1.0;
  utt.volume = 1.0; // 최대 볼륨
  
  window.speechSynthesis.speak(utt);
}



    // 게임 종료
    function endGame() {
      gameState.gameInProgress = false;
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('endScreen').classList.add('active');
      document.getElementById('backBtn').style.display = 'none';
      
      document.getElementById('finalScore').textContent = gameState.score + '/10';
      
      const coinsEarned = gameState.sessionCoins + coinRewards[gameState.difficulty].complete;
      document.getElementById('coinsEarned').textContent = coinsEarned;

      if (gameState.mistakes.length > 0) {
        document.getElementById('reviewBtnEnd').style.display = 'block';
      }
    }

    // 복습 화면 표시
    function showReview() {
      document.getElementById('endScreen').classList.remove('active');
      document.getElementById('reviewScreen').classList.add('active');
      displayReviewPage(0);
    }

    // 복습 페이지 표시
    function displayReviewPage(page) {
      gameState.currentPage = page;
      const start = page * gameState.itemsPerPage;
      const end = start + gameState.itemsPerPage;
      const pageItems = gameState.mistakes.slice(start, end);

      const reviewItems = document.getElementById('reviewItems');
      reviewItems.innerHTML = '';

      if (pageItems.length === 0) {
        reviewItems.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">No mistakes to review</p>';
      } else {
        pageItems.forEach((mistake, index) => {
          const item = document.createElement('div');
          item.className = 'review-item';
          item.innerHTML = `
            <div class="review-item-question"><strong>Q${start + index + 1}:</strong> ${mistake.question}</div>
            <div class="review-item-answer">Your answer: <span style="color: #d32f2f;">${mistake.yourAnswer}</span></div>
            <div class="review-item-answer">Correct answer: <span style="color: #4caf50;">${mistake.correct}</span></div>
          `;
          reviewItems.appendChild(item);
        });
      }

      const totalPages = Math.ceil(gameState.mistakes.length / gameState.itemsPerPage);
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      for (let i = 0; i < totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === page ? ' active' : '');
        btn.textContent = i + 1;
        btn.onclick = () => displayReviewPage(i);
        pagination.appendChild(btn);
      }
    }

    // 다시 플레이 (코인 누적, 새 문제 세트)
    function playAgain() {
      document.getElementById('endScreen').classList.remove('active');
      document.getElementById('reviewScreen').classList.remove('active');
      
      gameState.currentQuestion = 0;
      gameState.score = 0;
      gameState.mistakes = [];
      gameState.currentPage = 0;
      gameState.gameInProgress = true;
      
      const levelKey = difficultyMap[gameState.difficulty];
      const allQuestions = questionData[levelKey];
      gameState.shuffledQuestions = shuffleQuestionsIntelligently(allQuestions);
      
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameArea').classList.add('active');
      document.getElementById('backBtn').style.display = 'block';
      
      loadQuestion();
    }

    // 홈으로 이동 (코인 리셋)
    function goHome() {
      gameState.gameInProgress = false;
      gameState.sessionCoins = 0;
      document.getElementById('totalCoins').textContent = '0';
      
      const fill = document.getElementById('coinBarFill');
      fill.style.width = '0%';
      
      document.getElementById('startScreen').classList.remove('hidden');
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('endScreen').classList.remove('active');
      document.getElementById('reviewScreen').classList.remove('active');
      document.getElementById('backBtn').style.display = 'none';
    }

    // 뒤로 이동
    function goBack() {
      if (gameState.gameInProgress) {
        if (confirm('Are you sure you want to quit the game?')) {
          goHome();
        }
      }
    }

    document.getElementById('totalCoins').textContent = '0';
